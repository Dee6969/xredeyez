  <!-- Descriptor line -->
  <text x="68" y="268" font-family="'Courier New', monospace" font-size="15" fill="rgba(245,240,230,0.62)" letter-spacing="1">Court city cannabis / Binnenhof / North Sea coast</text>

  <!-- Accent line -->
