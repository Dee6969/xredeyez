<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BA7C4"/>
      <stop offset="60%" stop-color="#A8C8DC"/>
      <stop offset="100%" stop-color="#C8DDE8"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B9DB8"/>
      <stop offset="100%" stop-color="#4A7A96"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D1E2C" stop-opacity="0.88"/>
      <stop offset="45%" stop-color="#0D1E2C" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0D1E2C" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Clouds -->
