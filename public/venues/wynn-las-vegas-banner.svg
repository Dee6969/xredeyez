<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050503"/>
      <stop offset="100%" stop-color="#0E0C08"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D080"/>
      <stop offset="50%" stop-color="#C8A840"/>
      <stop offset="100%" stop-color="#A07820"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#C8A840" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C8A840" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Wynn tower silhouette — curved distinctive shape -->
  <!-- Main tower -->
  <path d="M 940 680 L 940 240 Q 940 160 1060 140 Q 1180 120 1200 240 L 1200 680 Z" fill="#1A1408"/>
  <!-- Tower highlights (glass curtain wall) -->
  <path d="M 950 680 L 950 248 Q 950 175 1060 155 Q 1170 135 1190 248 L 1190 680 Z" fill="none" stroke="#C8A840" stroke-width="1" opacity="0.3"/>
  <!-- Window bands -->
  <rect x="955" y="260" width="230" height="3" fill="#C8A840" opacity="0.2"/>
  <rect x="955" y="300" width="230" height="3" fill="#C8A840" opacity="0.2"/>
  <rect x="955" y="340" width="230" height="3" fill="#C8A840" opacity="0.2"/>
  <rect x="955" y="380" width="230" height="3" fill="#C8A840" opacity="0.2"/>
  <rect x="955" y="420" width="230" height="3" fill="#C8A840" opacity="0.2"/>
  <rect x="955" y="460" width="230" height="3" fill="#C8A840" opacity="0.2"/>
  <rect x="955" y="500" width="230" height="3" fill="#C8A840" opacity="0.2"/>
  <rect x="955" y="540" width="230" height="3" fill="#C8A840" opacity="0.2"/>
  <rect x="955" y="580" width="230" height="3" fill="#C8A840" opacity="0.2"/>
  <rect x="955" y="620" width="230" height="3" fill="#C8A840" opacity="0.2"/>
  <!-- Glowing windows -->
  <rect x="970" y="268" width="40" height="24" fill="#C8A840" opacity="0.08"/>
  <rect x="1020" y="268" width="40" height="24" fill="#C8A840" opacity="0.12"/>
  <rect x="1070" y="268" width="40" height="24" fill="#C8A840" opacity="0.08"/>
  <rect x="1120" y="268" width="40" height="24" fill="#C8A840" opacity="0.1"/>
  <rect x="970" y="308" width="40" height="24" fill="#C8A840" opacity="0.1"/>
  <rect x="1020" y="308" width="40" height="24" fill="#C8A840" opacity="0.08"/>
  <rect x="1070" y="308" width="40" height="24" fill="#C8A840" opacity="0.14"/>
  <rect x="1120" y="308" width="40" height="24" fill="#C8A840" opacity="0.08"/>
  <!-- Encore tower beside -->
  <rect x="1220" y="300" width="180" height="380" fill="#151008"/>
  <rect x="1230" y="310" width="160" height="365" fill="none" stroke="#C8A840" stroke-width="0.8" opacity="0.25"/>
  <rect x="1220" y="288" width="180" height="16" fill="#1A1408"/>
  <rect x="1250" y="272" width="120" height="20" fill="#151008"/>
  <rect x="1230" y="318" width="160" height="3" fill="#C8A840" opacity="0.15"/>
  <rect x="1230" y="358" width="160" height="3" fill="#C8A840" opacity="0.15"/>
  <rect x="1230" y="398" width="160" height="3" fill="#C8A840" opacity="0.15"/>
  <rect x="1230" y="438" width="160" height="3" fill="#C8A840" opacity="0.15"/>
  <rect x="1230" y="478" width="160" height="3" fill="#C8A840" opacity="0.15"/>
  <rect x="1230" y="518" width="160" height="3" fill="#C8A840" opacity="0.15"/>
  <rect x="1230" y="558" width="160" height="3" fill="#C8A840" opacity="0.15"/>
  <rect x="1230" y="598" width="160" height="3" fill="#C8A840" opacity="0.15"/>
  <!-- Strip ground -->
  <rect x="900" y="680" width="700" height="20" fill="#0E0C08"/>
  <!-- Wynn logo / entrance arch -->
  <path d="M 1010 680 Q 1070 650 1130 680" fill="none" stroke="#C8A840" stroke-width="3" opacity="0.6"/>

  <!-- Strip lights distant -->
  <circle cx="1450" cy="660" r="2" fill="#FF8C00" opacity="0.5"/>
  <circle cx="1490" cy="650" r="1.5" fill="#FF4444" opacity="0.4"/>
  <circle cx="1530" cy="660" r="2" fill="#4488FF" opacity="0.4"/>

  <!-- Diagonal stripe pattern subtle -->
  <g opacity="0.04" stroke="#C8A840" stroke-width="0.5">
    <line x1="0" y1="0" x2="800" y2="900"/>
    <line x1="100" y1="0" x2="900" y2="900"/>
    <line x1="200" y1="0" x2="1000" y2="900"/>
    <line x1="300" y1="0" x2="1100" y2="900"/>
    <line x1="400" y1="0" x2="1200" y2="900"/>
    <line x1="500" y1="0" x2="1300" y2="900"/>
    <line x1="600" y1="0" x2="1400" y2="900"/>
    <line x1="700" y1="0" x2="1500" y2="900"/>
  </g>

  <!-- Text overlay left fade -->
  <rect x="0" y="0" width="950" height="900" fill="#050503" opacity="0.55"/>

  <!-- XRED EYEZ label -->
  <text x="68" y="90" font-family="'Courier New', monospace" font-size="12" fill="#C8A840" letter-spacing="4" opacity="0.9">XRED EYEZ SELECT</text>

  <!-- Wordmark — Wynn signature style -->
  <text x="64" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="118" fill="#F5F0E6" font-weight="400" letter-spacing="4" font-style="italic">Wynn</text>

  <!-- Gold tagline -->
  <text x="68" y="292" font-family="'Courier New', monospace" font-size="13" fill="#C8A840" letter-spacing="2" opacity="0.9">Las Vegas Strip. Forbes Five-Star.</text>

  <!-- Divider -->
  <rect x="68" y="312" width="220" height="1.5" fill="url(#gold)" opacity="0.7"/>

  <text x="68" y="350" font-family="'Courier New', monospace" font-size="11" fill="rgba(245,240,230,0.38)" letter-spacing="1">Las Vegas Strip · Hotel · Est. 2005</text>

  <text x="68" y="850" font-family="'Courier New', monospace" font-size="10" fill="rgba(200,168,64,0.35)" letter-spacing="3">LAS VEGAS</text>
</svg>
