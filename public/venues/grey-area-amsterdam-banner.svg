  <!-- Grain -->
  <rect width="1600" height="900" fill="url(#bg)" opacity="0.15"/>

  <!-- XRED EYEZ label -->
  <text x="68" y="90" font-family="'Courier New', monospace" font-size="12" fill="#84C51F" letter-spacing="4" opacity="0.9">XRED EYEZ CULTURE</text>

  <!-- Wordmark -->
