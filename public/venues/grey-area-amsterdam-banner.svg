    <rect x="1340" y="492" width="24" height="32" fill="#84C51F" opacity="0.3"/>
    <rect x="1378" y="492" width="24" height="32" fill="#84C51F" opacity="0.2"/>
    <rect x="1352" y="622" width="34" height="58" fill="#84C51F" opacity="0.15"/>

