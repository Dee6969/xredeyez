    <rect x="903" y="474" width="18" height="26" fill="#84C51F" opacity="0.2"/>
    <rect x="929" y="474" width="18" height="26" fill="#84C51F" opacity="0.15"/>
    <rect x="903" y="512" width="18" height="26" fill="#84C51F" opacity="0.18"/>
    <rect x="929" y="512" width="18" height="26" fill="#84C51F" opacity="0.25"/>
