    <rect x="985" y="406" width="24" height="32" fill="#84C51F" opacity="0.22"/>
    <rect x="1021" y="406" width="24" height="32" fill="#84C51F" opacity="0.3"/>
    <rect x="985" y="452" width="24" height="32" fill="#84C51F" opacity="0.18"/>
    <rect x="1021" y="452" width="24" height="32" fill="#84C51F" opacity="0.2"/>
