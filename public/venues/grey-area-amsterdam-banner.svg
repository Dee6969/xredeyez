  <text x="64" y="312" font-family="Georgia, 'Times New Roman', serif" font-size="86" fill="#F5F0E6" font-weight="700" letter-spacing="-1">AREA</text>

  <!-- Green accent -->
  <text x="68" y="362" font-family="'Courier New', monospace" font-size="13" fill="#84C51F" letter-spacing="1" opacity="0.9">American genetics. Jordaan institution.</text>
  <rect x="68" y="382" width="180" height="2.5" fill="#84C51F" opacity="0.8"/>

  <text x="68" y="420" font-family="'Courier New', monospace" font-size="11" fill="rgba(245,240,230,0.4)" letter-spacing="1">Jordaan · Cannabis · Est. 1994</text>

  <text x="68" y="850" font-family="'Courier New', monospace" font-size="10" fill="rgba(132,197,31,0.35)" letter-spacing="3">AMSTERDAM</text>
