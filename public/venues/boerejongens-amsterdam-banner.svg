<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A0806"/>
      <stop offset="100%" stop-color="#1A1408"/>
    </linearGradient>
    <linearGradient id="goldSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A847"/>
      <stop offset="50%" stop-color="#F0C84A"/>
      <stop offset="100%" stop-color="#B8902A"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Marble texture lines -->
  <line x1="0" y1="120" x2="1600" y2="180" stroke="#D4A847" stroke-width="0.4" opacity="0.12"/>
  <line x1="0" y1="280" x2="1600" y2="240" stroke="#D4A847" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="440" x2="1600" y2="520" stroke="#D4A847" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="650" x2="1600" y2="600" stroke="#D4A847" stroke-width="0.3" opacity="0.07"/>

  <!-- Amsterdam School architectural arches — right panel -->
  <g opacity="0.85">
    <!-- Large arch frame -->
    <path d="M 880 680 L 880 340 Q 880 200 1020 200 Q 1160 200 1160 340 L 1160 680" fill="none" stroke="url(#goldSheen)" stroke-width="3"/>
    <!-- Inner arch -->
    <path d="M 920 680 L 920 360 Q 920 248 1020 248 Q 1120 248 1120 360 L 1120 680" fill="none" stroke="#D4A847" stroke-width="1.5" opacity="0.6"/>
    <!-- Column detail -->
    <rect x="876" y="648" width="12" height="36" fill="#D4A847" opacity="0.5"/>
    <rect x="1152" y="648" width="12" height="36" fill="#D4A847" opacity="0.5"/>
    <!-- Keystone -->
    <polygon points="1006,196 1020,180 1034,196" fill="#D4A847" opacity="0.8"/>

    <!-- Second arch -->
    <path d="M 1200 680 L 1200 400 Q 1200 288 1310 288 Q 1420 288 1420 400 L 1420 680" fill="none" stroke="#D4A847" stroke-width="2" opacity="0.5"/>
    <path d="M 1232 680 L 1232 414 Q 1232 320 1310 320 Q 1388 320 1388 414 L 1388 680" fill="none" stroke="#D4A847" stroke-width="1" opacity="0.35"/>
    <polygon points="1297,284 1310,268 1323,284" fill="#D4A847" opacity="0.55"/>

    <!-- Decorative horizontal band -->
    <rect x="880" y="540" width="540" height="2" fill="#D4A847" opacity="0.35"/>
    <rect x="880" y="430" width="540" height="1" fill="#D4A847" opacity="0.22"/>
  </g>

  <!-- Brass/marble shelf detail -->
  <rect x="820" y="674" width="650" height="6" fill="url(#goldSheen)" opacity="0.5"/>

  <!-- Diagonal grid lines (subtle Amsterdam School brickwork) -->
  <g opacity="0.06" stroke="#D4A847" stroke-width="0.5">
    <line x1="820" y1="0" x2="820" y2="900"/>
    <line x1="880" y1="0" x2="880" y2="900"/>
    <line x1="940" y1="0" x2="940" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1060" y1="0" x2="1060" y2="900"/>
    <line x1="1120" y1="0" x2="1120" y2="900"/>
    <line x1="1180" y1="0" x2="1180" y2="900"/>
    <line x1="1240" y1="0" x2="1240" y2="900"/>
    <line x1="1300" y1="0" x2="1300" y2="900"/>
    <line x1="1360" y1="0" x2="1360" y2="900"/>
    <line x1="1420" y1="0" x2="1420" y2="900"/>
    <line x1="1480" y1="0" x2="1480" y2="900"/>
    <line x1="1540" y1="0" x2="1540" y2="900"/>
  </g>

  <!-- Left text panel -->
  <!-- XRED EYEZ SELECT -->
  <text x="68" y="90" font-family="'Courier New', monospace" font-size="12" fill="#D4A847" letter-spacing="4" opacity="0.8">XRED EYEZ SELECT</text>

  <!-- Wordmark -->
  <text x="64" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="82" fill="#F5F0E6" font-weight="700" letter-spacing="-1">BOERE-</text>
  <text x="64" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="82" fill="#F5F0E6" font-weight="700" letter-spacing="-1">JONGENS</text>

  <!-- Gold tagline -->
  <text x="68" y="370" font-family="'Courier New', monospace" font-size="13" fill="#D4A847" letter-spacing="1" opacity="0.9">Cannabis sommeliers. Amsterdam School.</text>

  <!-- Divider -->
  <rect x="68" y="392" width="220" height="2" fill="url(#goldSheen)" opacity="0.8"/>

  <!-- Sub copy -->
  <text x="68" y="430" font-family="'Courier New', monospace" font-size="11" fill="rgba(245,240,230,0.45)" letter-spacing="1">Jordaan · Cannabis · Est. 2012</text>

  <!-- Bottom mark -->
  <text x="68" y="850" font-family="'Courier New', monospace" font-size="10" fill="rgba(213,168,71,0.4)" letter-spacing="3">AMSTERDAM</text>
</svg>
