  <text x="68" y="342" font-family="'Courier New', monospace" font-size="13" fill="rgba(200,192,176,0.75)" letter-spacing="1">Glass atrium. Oud-Zuid. Luxury design hotel.</text>

  <!-- Divider -->
  <rect x="68" y="362" width="200" height="1.5" fill="#C8C0B0" opacity="0.6"/>

  <!-- Sub -->
