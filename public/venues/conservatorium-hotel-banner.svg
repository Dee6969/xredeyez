  <!-- Fade overlay on grid -->
  <rect x="780" y="0" width="820" height="900" fill="#0C0E0F" opacity="0.35"/>

  <!-- XRED EYEZ label -->
  <text x="68" y="90" font-family="'Courier New', monospace" font-size="12" fill="rgba(200,192,176,0.7)" letter-spacing="4">XRED EYEZ SELECT</text>

  <!-- Wordmark -->
