    <line x1="940" y1="380" x2="1100" y2="480" stroke="#C8C0B0" stroke-width="0.8" opacity="0.35"/>
    <line x1="1100" y1="380" x2="940" y2="480" stroke="#C8C0B0" stroke-width="0.8" opacity="0.35"/>
    <line x1="1100" y1="380" x2="1260" y2="480" stroke="#C8C0B0" stroke-width="0.8" opacity="0.35"/>
    <line x1="1260" y1="380" x2="1100" y2="480" stroke="#C8C0B0" stroke-width="0.8" opacity="0.35"/>

