  <path d="M 810 380 L 810 420 Q 820 440 830 420 L 830 380 Z" fill="#2A1E10" opacity="0.8"/>
  <path d="M 848 380 L 848 420 Q 858 440 868 420 L 868 380 Z" fill="#2A1E10" opacity="0.8"/>
