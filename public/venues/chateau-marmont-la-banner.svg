  <path d="M 1000 400 L 1000 440 Q 1015 460 1030 440 L 1030 400 Z" fill="#2A1E10" opacity="0.6"/>
  <path d="M 1040 400 L 1040 440 Q 1055 460 1070 440 L 1070 400 Z" fill="#E8A840" opacity="0.18"/>
  <path d="M 1080 400 L 1080 440 Q 1095 460 1110 440 L 1110 400 Z" fill="#2A1E10" opacity="0.6"/>
  <path d="M 1120 400 L 1120 440 Q 1135 460 1150 440 L 1150 400 Z" fill="#E8A840" opacity="0.15"/>
  <path d="M 1160 400 L 1160 440 Q 1175 460 1190 440 L 1190 400 Z" fill="#2A1E10" opacity="0.6"/>
  <path d="M 1200 400 L 1200 440 Q 1215 460 1230 440 L 1230 400 Z" fill="#E8A840" opacity="0.2"/>
  <path d="M 1240 400 L 1240 440 Q 1255 460 1270 440 L 1270 400 Z" fill="#2A1E10" opacity="0.6"/>
  <!-- Second floor windows -->
  <path d="M 920 470 L 920 510 Q 935 530 950 510 L 950 470 Z" fill="#E8A840" opacity="0.18"/>
  <path d="M 970 470 L 970 510 Q 985 530 1000 510 L 1000 470 Z" fill="#2A1E10" opacity="0.6"/>
  <path d="M 1020 470 L 1020 510 Q 1035 530 1050 510 L 1050 470 Z" fill="#E8A840" opacity="0.22"/>
  <path d="M 1070 470 L 1070 510 Q 1085 530 1100 510 L 1100 470 Z" fill="#2A1E10" opacity="0.6"/>
  <path d="M 1120 470 L 1120 510 Q 1135 530 1150 510 L 1150 470 Z" fill="#E8A840" opacity="0.15"/>
  <path d="M 1170 470 L 1170 510 Q 1185 530 1200 510 L 1200 470 Z" fill="#E8A840" opacity="0.2"/>
  <path d="M 1220 470 L 1220 510 Q 1235 530 1250 510 L 1250 470 Z" fill="#2A1E10" opacity="0.6"/>
  <path d="M 1270 470 L 1270 510 Q 1285 530 1300 510 L 1300 470 Z" fill="#E8A840" opacity="0.18"/>
