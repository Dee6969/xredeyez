  <ellipse cx="1100" cy="690" rx="200" ry="20" fill="#E8A840" opacity="0.05"/>

  <!-- Left text fade -->
  <rect x="0" y="0" width="820" height="900" fill="#100C08" opacity="0.72"/>

  <!-- XRED EYEZ label -->
  <text x="68" y="90" font-family="'Courier New', monospace" font-size="12" fill="#E8A840" letter-spacing="4" opacity="0.85">XRED EYEZ SELECT</text>

  <!-- Wordmark -->
  <text x="64" y="218" font-family="Georgia, 'Times New Roman', serif" font-size="52" fill="#F5F0E6" font-weight="700" letter-spacing="-0.5">CHÂTEAU</text>
  <text x="64" y="294" font-family="Georgia, 'Times New Roman', serif" font-size="52" fill="#F5F0E6" font-weight="700" letter-spacing="-0.5">MARMONT</text>

  <!-- Tagline -->
  <text x="68" y="346" font-family="'Courier New', monospace" font-size="13" fill="#E8A840" letter-spacing="1" opacity="0.9">Sunset Strip legend. Est. 1929.</text>
  <rect x="68" y="366" width="200" height="1.5" fill="url(#amber)" opacity="0.7"/>

  <text x="68" y="404" font-family="'Courier New', monospace" font-size="11" fill="rgba(245,240,230,0.38)" letter-spacing="1">West Hollywood · Hotel · Est. 1929</text>

  <text x="68" y="850" font-family="'Courier New', monospace" font-size="10" fill="rgba(232,168,64,0.35)" letter-spacing="3">LOS ANGELES</text>
</svg>
