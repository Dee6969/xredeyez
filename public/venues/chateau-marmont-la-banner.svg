    <rect x="1312" y="556" width="8" height="124" fill="#2A2018"/>
    <ellipse cx="1316" cy="546" rx="32" ry="20" fill="#2A3818" transform="rotate(15, 1316, 546)"/>
    <ellipse cx="1316" cy="544" rx="28" ry="16" fill="#2A3818" transform="rotate(-5, 1316, 544)"/>
    <ellipse cx="1316" cy="548" rx="24" ry="14" fill="#2A3818" transform="rotate(-25, 1316, 548)"/>
  </g>

  <!-- Driveway / ground -->
  <rect x="780" y="680" width="820" height="20" fill="#14100C"/>
  <line x1="1000" y1="682" x2="1200" y2="700" stroke="#E8A840" stroke-width="1" opacity="0.12"/>
  <line x1="1050" y1="682" x2="1150" y2="700" stroke="#E8A840" stroke-width="0.5" opacity="0.08"/>

