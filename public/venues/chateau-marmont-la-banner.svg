    <ellipse cx="870" cy="550" rx="32" ry="20" fill="#2A3818" transform="rotate(-15, 870, 550)"/>
    <ellipse cx="870" cy="548" rx="28" ry="16" fill="#2A3818" transform="rotate(5, 870, 548)"/>
    <ellipse cx="870" cy="552" rx="24" ry="14" fill="#2A3818" transform="rotate(25, 870, 552)"/>
