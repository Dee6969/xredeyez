<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#100C08"/>
      <stop offset="100%" stop-color="#1C1610"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8A840"/>
      <stop offset="100%" stop-color="#C07820"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Gothic/chateau architecture — right panel -->
  <!-- Castle tower left -->
  <rect x="780" y="320" width="120" height="360" fill="#1E1610"/>
  <rect x="780" y="306" width="120" height="18" fill="#181208"/>
  <!-- Battlements -->
